<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طرق الدفع - AmtiXDev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b1020;
      --card:#0f1630cc;
      --accent:#5b8cff;
      --accent-2:#22c55e;
      --text:#e6e9f5;
      --muted:#a7b0ff;
      --border:rgba(255,255,255,.12);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:'Cairo',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(1200px 600px at 80% -10%, #1a245a 0%, transparent 60%),
                 radial-gradient(800px 400px at -10% 10%, #0ea5e9 0%, transparent 55%),
                 var(--bg);
      color:var(--text);
      display:grid;
      place-items:center;
      padding:32px;
    }
    .container{
      width:100%;
      max-width:820px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      backdrop-filter: blur(14px);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:0 30px 80px rgba(0,0,0,.45);
      padding:28px;
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:24px;
    }
    .title{
      display:flex;align-items:center;gap:12px;
    }
    .logo{
      width:44px;height:44px;border-radius:12px;
      background:linear-gradient(135deg, var(--accent), #7c9bff);
      display:grid;place-items:center;
      color:#fff;font-weight:800;
      box-shadow:0 10px 30px rgba(91,140,255,.45);
    }
    h1{font-size:clamp(20px,3vw,26px);margin:0}
    .badge{
      padding:6px 12px;border-radius:999px;
      background:rgba(91,140,255,.15);
      border:1px solid var(--border);
      color:#cdd6ff;font-size:12px
    }
    .grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
      position:relative;
      overflow:hidden;
    }
    .card::after{
      content:"";position:absolute;inset:auto -40% -60% auto;width:120%;height:120%;
      background:radial-gradient(closest-side, rgba(91,140,255,.18), transparent 70%);
      transform:rotate(8deg)
    }
    .card h2{margin:0 0 10px 0;font-size:16px}
    .hint{font-size:12px;color:#c7ccff;margin-bottom:10px}
    .field{
      display:flex;gap:10px;align-items:center
    }
    .field input{
      flex:1;background:rgba(0,0,0,.35);border:1px solid var(--border);
      color:var(--text);border-radius:10px;padding:12px 14px;font-size:14px
    }
    .btn{
      border:none;border-radius:10px;padding:12px 14px;cursor:pointer;
      background:linear-gradient(135deg, var(--accent), #7c9bff);
      color:white;font-weight:700
    }
    .btn.secondary{background:linear-gradient(135deg, #22c55e, #16a34a)}
    .btn:active{transform:translateY(1px)}
    footer{
      margin-top:22px;display:flex;align-items:center;justify-content:space-between;gap:12px
    }
    .foot{font-size:12px;color:#c7ccff}
    @media (max-width:520px){header{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
  <main class="container">
    <header>
      <div class="title">
        <div class="logo">A</div>
        <h1>طرق الدفع — AmtiXDev</h1>
      </div>
      <span class="badge">Modern Web UI</span>
    </header>

    <section class="grid">
      <article class="card">
        <h2>البيانات البنكية</h2>
        <p class="hint">رقم الحساب</p>
        <div class="field">
          <input readonly value="059101869432" />
          <button class="btn" onclick="copy(this)">نسخ</button>
        </div>
        <p class="hint" style="margin-top:12px">IBAN</p>
        <div class="field">
          <input readonly value="EG040046010200000059101869432" />
          <button class="btn" onclick="copy(this)">نسخ</button>
        </div>
      </article>

      <article class="card">
        <h2>فودافون كاش</h2>
        <div class="field">
          <input readonly value="01010781359" />
          <button class="btn secondary" onclick="copy(this)">نسخ</button>
        </div>
      </article>

      <article class="card">
        <h2>اتصالات كاش / إنستاباي</h2>
        <div class="field">
          <input readonly value="01114791825" />
          <button class="btn secondary" onclick="copy(this)">نسخ</button>
        </div>
      </article>
    </section>

    <section class="card" style="margin-top:20px">
      <h2>Logs — آخر التحويلات</h2>
      <p class="hint">Webhook</p>
      <ul id="logs" style="list-style:none;padding:0;margin:0;display:grid;gap:10px"></ul>
    </section>

    <footer>
      <span class="foot">© amtixdev</span>
      <span class="foot">Secure • Fast • Copyable</span>
    </footer>
  </main>

  <script>
    function copy(btn){
      const input = btn.previousElementSibling;
      navigator.clipboard.writeText(input.value);
      const t = btn.textContent; btn.textContent='✓';
      setTimeout(()=>btn.textContent=t,900);
    }

    /* =========================
       Logs Script (قابل للتعديل)
       =========================
       كل عنصر يمثل عملية تحويل
       name  : اسم المرسل
       method: طريقة الدفع
       amount: المبلغ
       order  : الوقت
    */

    const transfers = [
      { name: 'Ahmed Ali Ahmed Ali', method: 'Vodafone Cash', amount: '+55 EGP', order: 'روبوكس' },
      { name: 'Kareem A Abou Omar', method: 'Vodafone Cash', amount: '+830 EGP', order: 'روبوكس' }
    ];

    const logsEl = document.getElementById('logs');

    function renderLogs(){
      logsEl.innerHTML = '';
      transfers.slice(0,5).forEach(t => {
        const li = document.createElement('li');
        li.style.background = 'rgba(0,0,0,.35)';
        li.style.border = '1px solid var(--border)';
        li.style.borderRadius = '12px';
        li.style.padding = '12px';
        li.innerHTML = `<strong>${t.name}</strong> — ${t.method}<br><span style="font-size:12px;color:#c7ccff">${t.amount} • ${t.order}</span>`;
        logsEl.appendChild(li);
      });
    }

    renderLogs();
  </script>
</body>
</html>
